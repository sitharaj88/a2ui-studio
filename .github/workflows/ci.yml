name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - run: node --check media/main.js && node --check media/examples.js
      - run: npm test
      - run: npx vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: a2ui-studio-vsix
          path: '*.vsix'
